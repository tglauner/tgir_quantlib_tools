name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test-and-docs:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install LaTeX toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y latexmk texlive-latex-base texlive-latex-recommended texlive-fonts-recommended texlive-latex-extra

      - name: Create virtual environment
        run: python -m venv .venv

      - name: Install Python dependencies
        run: |
          .venv/bin/python -m pip install --upgrade pip
          .venv/bin/python -m pip install -r requirements.txt

      - name: Compile Python sources
        run: |
          .venv/bin/python -m py_compile app.py wsgi.py portfolio.py tgir_quantlib_tools/*.py

      - name: Run cliquet identity tests
        run: .venv/bin/python -m unittest tests.test_cliquet

      - name: Run curve and calibration tests
        run: .venv/bin/python -m unittest tests.test_sofr_curve

      - name: Run route and integration smoke tests
        run: .venv/bin/python -m unittest tests.test_smoke

      - name: Build LaTeX documentation
        run: make -C docs/latex

      - name: Upload LaTeX PDFs
        uses: actions/upload-artifact@v4
        with:
          name: latex-docs
          path: docs/latex/*.pdf
