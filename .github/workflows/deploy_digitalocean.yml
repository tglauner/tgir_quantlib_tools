name: Deploy To DigitalOcean

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  deploy:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    environment: production

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Create virtual environment
        run: python -m venv .venv

      - name: Install dependencies
        run: |
          .venv/bin/python -m pip install --upgrade pip
          .venv/bin/python -m pip install -r requirements.txt

      - name: Run release-gate tests
        run: |
          .venv/bin/python -m unittest tests.test_cliquet
          .venv/bin/python -m unittest tests.test_sofr_curve
          .venv/bin/python -m unittest tests.test_smoke

      - name: Package release archive
        env:
          RELEASE_ARCHIVE: ${{ runner.temp }}/tgir_quantlib_tools-release.tgz
        run: |
          tar \
            --exclude='.git' \
            --exclude='.venv' \
            --exclude='docs/latex/*.pdf' \
            -czf "$RELEASE_ARCHIVE" .

      - name: Configure SSH
        env:
          DO_HOST: ${{ secrets.DO_HOST }}
          DO_SSH_KEY: ${{ secrets.DO_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$DO_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "$DO_HOST" >> ~/.ssh/known_hosts

      - name: Upload release archive
        env:
          DO_HOST: ${{ secrets.DO_HOST }}
          DO_USER: ${{ secrets.DO_USER }}
          RELEASE_ARCHIVE: ${{ runner.temp }}/tgir_quantlib_tools-release.tgz
        run: |
          scp "$RELEASE_ARCHIVE" "$DO_USER@$DO_HOST:/tmp/tgir_quantlib_tools-release.tgz"

      - name: Install release on droplet
        env:
          DO_APP_ROOT: ${{ secrets.DO_APP_ROOT }}
          DO_HOST: ${{ secrets.DO_HOST }}
          DO_USER: ${{ secrets.DO_USER }}
        run: |
          ssh "$DO_USER@$DO_HOST" "
            set -euo pipefail
            APP_ROOT='${DO_APP_ROOT:-/var/www/html/tgir_quantlib_tools}'
            sudo mkdir -p \"\$APP_ROOT\"
            if [ ! -f \"\$APP_ROOT/.env\" ]; then
              echo 'Missing \$APP_ROOT/.env on droplet' >&2
              exit 1
            fi
            sudo find \"\$APP_ROOT\" -mindepth 1 -maxdepth 1 \
              ! -name '.env' \
              ! -name 'debug' \
              -exec rm -rf {} +
            sudo tar -xzf /tmp/tgir_quantlib_tools-release.tgz -C \"\$APP_ROOT\"
            sudo python3 -m venv \"\$APP_ROOT/.venv\"
            sudo \"\$APP_ROOT/.venv/bin/python\" -m pip install --upgrade pip
            sudo \"\$APP_ROOT/.venv/bin/python\" -m pip install -r \"\$APP_ROOT/requirements-production.txt\"
            sudo mkdir -p \"\$APP_ROOT/debug\"
            sudo chown -R www-data:www-data \"\$APP_ROOT\"
            sudo systemctl restart tgir-quantlib-tools
            curl -fsS http://127.0.0.1:8008/health
          "

      - name: Run public health check
        env:
          DO_HEALTHCHECK_URL: ${{ secrets.DO_HEALTHCHECK_URL }}
        run: curl -fsS "$DO_HEALTHCHECK_URL"
